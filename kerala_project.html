<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kerala Environmental Vulnerability Dashboard/title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b1f33;
    color:white;
}

/* contour background */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
    opacity:0.18;
    z-index:-1;
}

.container{
    width:90%;
    max-width:1100px;
    margin:auto;
    padding:40px 0;
}

/* HERO */
.hero{
    text-align:center;
    padding:50px 20px;
}

.hero h1{
    font-size:34px;
    margin-bottom:10px;
}

.hero p{
    opacity:0.85;
}

/* SECTION BOX */
section{
    background:white;
    color:#1a1a1a;
    padding:25px;
    margin:20px 0;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

/* headings */
h2{
    color:#0b3d91;
}

/* FLOWCHART */
.flow{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

.row{
    display:flex;
    gap:30px;
    justify-content:center;
    flex-wrap:wrap;
}

.box{
    background:#e8f1ff;
    border:2px solid #4a90e2;
    padding:10px 14px;
    border-radius:8px;
    min-width:160px;
    text-align:center;
    font-weight:bold;
}

.arrow{
    font-size:20px;
    color:#4a90e2;
}

/* MAP GRID */
.maps{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.map{
    background:#f4f6f8;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.map:hover{
    transform:scale(1.06);
}

.map img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.map p{
    text-align:center;
    padding:8px;
    font-weight:bold;
}

/* LINKS */
a{
    color:green;
    text-decoration:none;
}

/* MODAL */
#modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

#modal img{
    max-width:85%;
    max-height:85%;
}
</style>
</head>

<body>

<div class="container">

<!-- HERO -->
<div class="hero">
<h1>Kerala Environmental Vulnerability Dashboard</h1>
<p>Python • GIS • Remote Sensing • Google Earth Engine • Streamlit</p>
</div>

<!-- OVERVIEW -->
<section>
This project develops an Environmental Vulnerability Index (EVI) for Kerala using GIS, remote sensing, and Python. Multiple environmental indicators—including Digital Elevation Model (DEM), slope, rainfall, vegetation (NDVI), and land cover—were integrated into a weighted model to assess environmental vulnerability across the state.

The project combines Google Earth Engine for remote sensing, QGIS for spatial processing, and Python for raster analysis, statistical calculations, and development of an interactive Streamlit dashboard. The final output supports environmental assessment through interactive visualization and spatial analysis.
</section>

<!-- CONCEPT -->
<section>
<h2>Methodology</h2>
<p>
The Environmental Vulnerability Index (EVI) was developed by integrating five environmental indicators representing terrain, vegetation, climate, and land cover characteristics. Each dataset was preprocessed, normalized, assigned a weight according to its influence on environmental vulnerability, and combined using a weighted overlay approach.

The final EVI ranges from lower vulnerability to higher vulnerability and is visualized through an interactive Streamlit dashboard.
<p>    
</section>

<!-- DATA -->
<section>
<h2>Data & Variables</h2>
<ul>
Digital Elevation Model (DEM)

Slope

Rainfall

Normalized Difference Vegetation Index (NDVI)

Land Cover

Environmental Vulnerability Index (EVI)
</ul>
</section>

<!-- METHODOLOGY -->
<section>
<h2>Methodology Flowchart</h2>

<div class="flow">

<div class="box">WorldClim</div>
<div class="box">Temperature + Precipitation</div>
<div class="arrow">↓ CSI</div>

<div class="row">
<div class="box">Landsat NDVI</div>
<div class="box">Forest Cover</div>
</div>
<div class="arrow">↓ ACI</div>

<div class="row">
<div class="box">Slope</div>
<div class="box">Aspect</div>
<div class="box">Land Cover</div>
</div>
<div class="arrow">↓ ESI</div>

<div class="arrow">ACI + CSI + ESI</div>
<div class="box">Resilience Index (RI)</div>

</div>
</section>

<!-- FORMULAS -->
<section>
<h2>Index Formulation</h2>

<p><b>Adaptive Capacity Index (ACI)</b></p>
<p>ACI = (NDVI_norm + Forest_cover_norm) / 2</p>

<p><b>Climate Stress Index (CSI)</b></p>
<p>CSI = (Temperature_norm + Precipitation_norm) / 2</p>

<p><b>Ecosystem Sensitivity Index (ESI)</b></p>
<p>ESI = (Slope_norm + Aspect_norm + LULC_norm) / 3</p>

<p><b>Resilience Index (RI)</b></p>
<p>RI = (ACI + (1 - CSI) + (1 - ESI)) / 3</p>
</section>

<!-- MAPS -->
<section>
<h2>Final Output Maps</h2>

<div class="maps">

<div class="map" onclick="openImg('ACI.jpg')">
<img src="ACI.jpg">
<p>Adaptive Capacity Index (ACI)</p>
</div>

<div class="map" onclick="openImg('CSI.jpg')">
<img src="CSI.jpg">
<p>Climate Stress Index (CSI)</p>
</div>

<div class="map" onclick="openImg('ESI.jpg')">
<img src="ESI.jpg">
<p>Ecosystem Sensitivity Index (ESI)</p>
</div>

<div class="map" onclick="openImg('RI.jpg')">
<img src="RI.jpg">
<p>Resilience Index (RI)</p>
</div>

</div>
</section>

<!-- INTERPRETATION -->
<section>
<h2>Interpretation</h2>
<p>
The results reveal spatial heterogeneity in ecosystem resilience across Jammu & Kashmir. High resilience zones correspond to stable vegetation and lower climatic stress, while low resilience zones indicate higher environmental vulnerability.
</p>
</section>

<!-- SKILLS -->
<section>
<h2>Skills Demonstrated</h2>
<ul>
<li>GIS Raster Analysis (QGIS)</li>
<li>Remote Sensing (NDVI)</li>
<li>Spatial Modeling (MCDA)</li>
<li>Environmental Index Construction</li>
<li>Cartographic Visualization</li>
<li>Data Normalization & Raster Processing</li>
</ul>
</section>

</div>

<!-- MODAL -->
<div id="modal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<script>
function openImg(src){

}
</script>

</body>
</html>
